<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>向東車庫 Eastward</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="向東車庫">
<meta name="application-name" content="向東車庫">
<meta name="theme-color" content="#1B3F5E">
<link rel="apple-touch-icon" href="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/eastwardlogo.jpg">
<link rel="icon" type="image/jpeg" href="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/eastwardlogo.jpg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green:#3B6D11;--green-light:#EAF3DE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --bg:#F5F4F0;--card:#FFF;--border:#E2E0DA;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#B4B2A9;
  --font:'Noto Sans TC',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* AUTH */
#auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)}
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
  .auth-logo{width:150px;height:150px;border-radius:20px;overflow:hidden;margin-bottom:20px}
.auth-logo img{width:100%;height:100%;object-fit:cover}
.auth-title{font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.auth-sub{font-size:11px;color:var(--text2);letter-spacing:1.5px;margin-bottom:36px;text-align:center}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 24px;background:white;border:1px solid var(--border);border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);width:100%;max-width:300px;justify-content:center}
.auth-note{font-size:11px;color:var(--text3);margin-top:12px;text-align:center}
.auth-hint{font-size:11px;color:var(--amber);margin-top:8px;text-align:center;background:var(--amber-light);padding:8px 14px;border-radius:8px;max-width:300px}

/* APP */
#app-screen{display:none;max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;padding-bottom:70px}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px 8px;position:sticky;top:0;z-index:100}
.topbar-row{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;border-radius:7px;overflow:hidden;flex-shrink:0}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-text{flex:1}
.topbar h1{font-size:14px;font-weight:700;color:var(--text)}
.topbar h1 span{font-size:10px;color:var(--blue);font-weight:400;letter-spacing:1.2px;margin-left:4px}
.topbar p{font-size:9px;color:var(--text3);letter-spacing:1px}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;display:inline-block;margin-left:4px;vertical-align:middle}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue-dark);cursor:pointer;overflow:hidden;flex-shrink:0}
.user-av img{width:100%;height:100%;object-fit:cover}

.nav{display:flex;background:var(--card);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100}
.nav button{flex:1;padding:9px 4px 7px;font-size:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--font);display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;transition:all 0.15s}
.nav button.active{color:var(--blue);border-top-color:var(--blue)}

.page{display:none;padding:10px}
.page.active{display:block}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PHASE ACCORDION ── */
.phase-block{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.phase-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--card);cursor:pointer;user-select:none}
.phase-header-left{display:flex;align-items:center;gap:8px}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-1{background:#378ADD}.dot-2{background:#639922}.dot-3{background:#1D9E75}
.phase-title{font-size:13px;font-weight:700;color:var(--text)}
.phase-count{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:10px}
.phase-chevron{font-size:14px;color:var(--text3);transition:transform 0.2s;line-height:1}
.phase-header.open .phase-chevron{transform:rotate(180deg)}
.phase-body{display:none;background:var(--bg);padding:10px}
.phase-body.open{display:block}

/* ── KANBAN (phase 1 & 3) ── */
.kanban-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.kanban-scroll::-webkit-scrollbar{display:none}
.kanban-col{flex:0 0 130px;min-width:130px}
.kanban-col-title{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px;letter-spacing:0.3px}
.col-count{font-size:10px;background:var(--card);border:1px solid var(--border);color:var(--text3);padding:1px 5px;border-radius:8px}
.kanban-drop{min-height:40px;border-radius:8px;transition:all 0.2s;display:flex;flex-direction:column;gap:6px}
.kanban-drop.drag-over{background:#EBF4FF;border:1.5px dashed var(--blue);min-height:60px}

/* MINI CARD (phase 1 & 3) */
.mini-card{background:var(--card);border-radius:9px;border:1px solid var(--border);padding:10px 11px;cursor:grab;user-select:none;transition:opacity 0.15s}
.mini-card.dragging{opacity:0.3}
.mini-card.warn30{border-left:3px solid #EF9F27;border-radius:0 9px 9px 0}
.mini-card.warn40{border-left:3px solid #E24B4A;border-radius:0 9px 9px 0}
.mini-card-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.mini-card-badge{font-size:10px;padding:1px 5px;border-radius:3px;display:inline-block}
.mini-card-edit{font-size:10px;color:var(--text3);margin-top:5px;text-align:right;cursor:pointer}
.mini-card-hint{font-size:9px;color:var(--text3);margin-top:3px;text-align:right}

/* FULL CARD (phase 2) */
.stage-group2{margin-bottom:12px}
.stage-label2{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.stage-cnt{background:var(--card);border:1px solid var(--border);color:var(--text3);font-size:10px;padding:1px 5px;border-radius:8px;margin-left:3px}
.full-drop{min-height:8px;border-radius:10px;transition:all 0.2s}
.full-drop.drag-over{min-height:52px;background:#EBF4FF;border:1.5px dashed var(--blue)}

.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:13px;margin-bottom:8px;cursor:grab;user-select:none}
.card.dragging{opacity:0.3}
.card.warn30{border-left:4px solid #EF9F27;border-radius:0 12px 12px 0}
.card.warn40{border-left:4px solid #E24B4A;border-radius:0 12px 12px 0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.card-name{font-size:14px;font-weight:700;color:var(--text)}
.card-right{display:flex;align-items:center;gap:5px}
.card-price{font-size:11px;color:var(--blue);font-weight:500}
.edit-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:13px;color:var(--text2)}
.card-files{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.file-btn{font-size:10px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px;font-family:var(--font);text-decoration:none}
.file-btn.has-file{border-color:#B5D4F4;color:var(--blue);background:var(--blue-light)}
.file-btn.upload{border-style:dashed}
.badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500}
.b-ok{background:var(--green-light);color:var(--green)}
.b-warn{background:var(--amber-light);color:var(--amber)}
.b-urgent{background:var(--red-light);color:var(--red)}
.b-none{background:#F1EFE8;color:var(--text3)}
.card-lists{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid var(--border);padding-top:8px}
.mini-list h4{font-size:10px;color:var(--text2);margin-bottom:3px}
.mini-list div{font-size:11px;color:var(--text);line-height:1.55}
.img-grid{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.img-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.drag-hint{font-size:9px;color:var(--text3);text-align:right;margin-top:5px}

.add-btn{width:100%;padding:11px;border:1.5px dashed var(--border);border-radius:12px;background:none;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);margin-top:6px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px 36px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text2);line-height:1;padding:0;font-family:var(--font)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-row input,.form-row textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);font-family:var(--font);outline:none}
.form-row input:focus,.form-row textarea:focus{border-color:var(--blue)}
.form-row textarea{height:68px;resize:none}
.form-row input[type=file]{padding:6px;font-size:12px}
.upload-progress{font-size:11px;color:var(--blue);margin-top:4px;display:none}
.uploaded-files{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.uploaded-tag{font-size:10px;padding:3px 8px;background:var(--blue-light);color:var(--blue);border-radius:4px;display:flex;align-items:center;gap:4px}
.save-btn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px}
.del-btn{width:100%;padding:11px;background:none;border:1px solid #F09595;color:var(--red);border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);margin-top:8px}

/* IMAGE VIEWER */
.viewer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center}
.viewer-bg.open{display:flex}
.viewer-bg img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
.viewer-close{position:absolute;top:16px;right:16px;color:white;font-size:30px;cursor:pointer;background:none;border:none}

/* TODO */
.todo-section{margin-bottom:18px}
.sec-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:9px}
.todo-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:11px;margin-bottom:7px}
.todo-shop{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.todo-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12px}
.chk{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.chk.done{background:var(--blue);border-color:var(--blue);color:white;font-size:11px}
.done-txt{text-decoration:line-through;color:var(--text3)}

/* COMPANY */
.co-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:15px;margin-bottom:10px}
.co-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.co-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.co-btn{padding:11px 6px;border:1px solid var(--border);border-radius:9px;background:none;font-size:11px;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:var(--font)}
.co-btn.wide{grid-column:span 2;flex-direction:row;justify-content:center;font-size:12px;gap:8px}
.namecard-img{width:100%;border-radius:10px;border:1px solid var(--border);display:block;cursor:pointer;margin-bottom:12px}
.logo-list{display:flex;flex-direction:column;gap:8px}
.logo-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px}
.logo-thumb{width:52px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;overflow:hidden}
.logo-thumb img{max-width:100%;max-height:100%;object-fit:contain}
.logo-info{flex:1;min-width:0}
.logo-name{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logo-url{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}

.toast-wrap{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;width:calc(100% - 32px);max-width:398px;display:flex;justify-content:center}
.toast{background:#2C2C2A;color:white;padding:10px 20px;border-radius:10px;font-size:13px;display:none;text-align:center}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div style="width:70px;height:70px;border-radius:14px;overflow:hidden;margin-bottom:16px"><img src="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/eastwardlogo.jpg" style="width:100%;height:100%;object-fit:cover"></div>
  <div style="font-size:14px;font-weight:700;color:var(--text)">向東車庫</div>
  <div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin-top:20px"></div>
</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo"><img src="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/eastwardlogo.jpg" alt="logo"></div>
  <div class="auth-title">向東車庫</div>
  <div class="auth-sub">EASTWARD · CUSTOM FOODTRUCK</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    使用 Google 帳號登入
  </button>
  <div class="auth-note">限公司成員使用</div>
  <div class="auth-hint">⚠️ 手機請用 Safari 或 Chrome，不可在 LINE 內登入</div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-logo"><img src="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/eastwardlogo.jpg" alt="logo"></div>
      <div class="topbar-text">
        <h1>向東車庫 <span>EASTWARD</span><span class="sync-dot" id="sync-dot"></span></h1>
        <p>FOOD TRUCK · INTERIOR DESIGN</p>
      </div>
      <div class="user-av" id="user-av" onclick="signOut()">?</div>
    </div>
  </div>

  <div id="page-schedule" class="page active"><div class="spinner"></div></div>
  <div id="page-todo" class="page"></div>
  <div id="page-logs" class="page"></div>
  <div id="page-company" class="page">
    <div class="co-card">
      <div class="co-title">🌐 官方網站</div>
      <button class="co-btn wide" onclick="window.open('https://goeast.tw/','_blank')">🔗 goeast.tw</button>
    </div>
    <div class="co-card">
      <div class="co-title">🪪 陳冠宇 電子名片</div>
      <img src="https://qiujqhyxmchyqwlrnqpz.supabase.co/storage/v1/object/public/assets/KuanYunamecard.png" class="namecard-img" onclick="viewImage(this.src)" alt="名片">
      <div class="co-btns">
        <button class="co-btn" onclick="shareCard('line')"><span style="font-size:20px">💬</span>分享到 LINE</button>
        <button class="co-btn" onclick="shareCard('download')"><span style="font-size:20px">⬇️</span>下載圖片</button>
      </div>
    </div>
    <div class="co-card">
      <div class="co-title"><span>🖼 LOGO 管理</span>
        <button style="font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-family:var(--font)" onclick="openLogoAdd()">＋ 新增</button>
      </div>
      <div class="logo-list" id="logo-list"><div class="spinner"></div></div>
    </div>
  </div>

  <nav class="nav">
    <button class="active" onclick="switchPage('schedule',this)"><span style="font-size:18px">📋</span>工作排程</button>
    <button onclick="switchPage('todo',this)"><span style="font-size:18px">✅</span>待辦採購</button>
    <button onclick="switchPage('company',this)"><span style="font-size:18px">🏪</span>公司介紹</button>
    <button onclick="switchPage('logs',this)"><span style="font-size:18px">📝</span>編輯紀錄</button>
  </nav>
</div>

<!-- VIEWER -->
<div class="viewer-bg" id="viewer" onclick="handleViewerBgClick(event)">
  <button class="viewer-close" onclick="closeViewer()">×</button>
  <button id="viewer-prev" onclick="event.stopPropagation();viewerNav(-1)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;color:white;font-size:32px;cursor:pointer;padding:8px 14px;border-radius:8px;z-index:10">‹</button>
  <div id="viewer-img-wrap" style="overflow:hidden;display:flex;align-items:center;justify-content:center;max-width:88vw;max-height:86vh">
    <img id="viewer-img" src="" alt="" onclick="event.stopPropagation()" style="max-width:88vw;max-height:86vh;object-fit:contain;border-radius:8px;touch-action:none;transform-origin:center center;transition:transform 0.1s">
  </div>
  <button id="viewer-next" onclick="event.stopPropagation();viewerNav(1)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;color:white;font-size:32px;cursor:pointer;padding:8px 14px;border-radius:8px;z-index:10">›</button>
  <div id="viewer-counter" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:white;font-size:12px;background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:10px"></div>
</div>

<!-- MODAL ADD -->
<div class="modal-bg" id="modal-add" onclick="handleModalBgClick(event,'modal-add')">
<div class="modal" onclick="event.stopPropagation()">
  <h3>新增業主專案 <button class="modal-x" onclick="closeModal('modal-add')">×</button></h3>
  <div class="form-row"><label>店名／業主名稱 *</label><input id="f-name" placeholder="例：好日子咖啡"/></div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:12px;padding:8px 10px;background:#F8F7F4;border-radius:6px">📌 其餘資料（報價、訂金、待辦等）進入第二階段後再填入</div>
  <button class="save-btn" id="add-save-btn" onclick="addCard()">新增專案</button>
</div>
</div>

<!-- MODAL EDIT -->
<div class="modal-bg" id="modal-edit" onclick="handleModalBgClick(event,'modal-edit')">
<div class="modal" onclick="event.stopPropagation()">
  <h3 id="edit-title">編輯專案 <button class="modal-x" onclick="closeModal('modal-edit')">×</button></h3>
  <div class="form-row"><label>店名／業主名稱</label><input id="e-name"/></div>
  <div class="form-row">
    <label>目前階段</label>
    <select id="e-stage" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);font-family:var(--font);outline:none">
      <optgroup label="第一階段">
        <option value="接洽中">接洽中</option>
        <option value="待討論">待討論</option>
        <option value="待繪圖">待繪圖</option>
        <option value="待報價">待報價</option>
        <option value="等現場">等現場</option>
      </optgroup>
      <optgroup label="第二階段">
        <option value="木工階段">木工階段</option>
        <option value="白鐵階段">白鐵階段</option>
        <option value="電路">電路</option>
        <option value="裝飾貼圖">裝飾貼圖</option>
      </optgroup>
      <optgroup label="第三階段">
        <option value="待清潔">待清潔</option>
        <option value="待交車">待交車</option>

    <div class="upload-progress" id="e-quote-prog">上傳中…</div>
    <div id="e-quote-preview" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px"></div>
    <div id="e-quote-current" style="margin-top:4px"></div>
    <div id="ai-parse-row" style="display:none;margin-top:8px">
      <button onclick="parseQuoteWithAI()" id="ai-parse-btn"
        style="width:100%;padding:10px;background:#F0F7FF;border:1px solid #B5D4F4;border-radius:8px;color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px">
        ✨ AI 自動讀取報價單，填入待辦事項
      </button>

    <div class="uploaded-files" id="e-3d-preview"></div>
    <div id="e-3d-current" style="margin-top:6px"></div>
  </div>
  <div class="form-row"><label>工單（每行一項，儲存後可打勾完成）</label><div id="e-todo-checklist" style="border:1px solid var(--border);border-radius:8px;padding:8px;max-height:220px;overflow-y:auto;background:var(--card)"></div><input type="hidden" id="e-todo"/></div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SURL='https://qiujqhyxmchyqwlrnqpz.supabase.co';
const SKEY='sb_publishable_M45mbS3tEP7UQfbtaX2P4Q_02RcilBw';
const sb=supabase.createClient(SURL,SKEY);

const P1_STAGES=['接洽中','待討論','待繪圖','待報價','等現場'];
const P2_STAGES=['木工階段','白鐵階段','電路','裝飾貼圖'];
const P3_STAGES=['待清潔','待交車'];
// open state: default p2 open, p1&p3 open too
const phaseOpen={p1:true,p2:true,p3:true};

let cards=[],logos=[],editingId=null,editingLogoId=null,currentUser=null;
let editPendingQuote=null,editPending3D=[];

// ── AUTH ─────────────────────────────────────────────────────
async function signInWithGoogle(){
  const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href}});
  if(error)showToast('登入失敗');
}
async function signOut(){
  if(!confirm('確定登出？'))return;
  await sb.auth.signOut();
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}
async function initAuth(){
  // Handle OAuth redirect with token in hash
  if(window.location.hash&&window.location.hash.includes('access_token')){
    await new Promise(r=>setTimeout(r,600));
    const{data}=await sb.auth.getSession();
    if(data?.session){currentUser=data.session.user;window.history.replaceState(null,'',window.location.pathname);showApp();return;}
  }
  // Check existing session
  const{data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;showApp();return;}
  // No session - show login
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  // Listen for future auth changes
  sb.auth.onAuthStateChange((ev,s)=>{
    if(s&&ev==='SIGNED_IN'){currentUser=s.user;showApp();}
    if(ev==='SIGNED_OUT'){
      document.getElementById('app-screen').style.display='none';
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('auth-screen').style.display='flex';
    }
  });
}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const av=document.getElementById('user-av');
  if(currentUser?.user_metadata?.avatar_url)av.innerHTML=`<img src="${currentUser.user_metadata.avatar_url}">`;
  else av.textContent=(currentUser?.user_metadata?.full_name||currentUser?.email||'?').charAt(0).toUpperCase();
  loadCards();loadLogos();subscribeRealtime();
}

// ── REALTIME ─────────────────────────────────────────────────
function subscribeRealtime(){
  sb.channel('c').on('postgres_changes',{event:'*',schema:'public',table:'cards'},()=>loadCards()).subscribe();
  // Logos realtime removed - managed locally to avoid overwriting renders
}
function setSyncing(v){document.getElementById('sync-dot').classList.toggle('syncing',v);}

// ── DATA ─────────────────────────────────────────────────────
async function loadCards(){
  setSyncing(true);
  const{data,error}=await sb.from('cards').select('*').order('created_at');
  if(!error){
    cards=data.map(c=>({...c,
      todos:c.todos?c.todos.split('\n').filter(Boolean):[],
      buys:c.buys?c.buys.split('\n').filter(Boolean):[],
      images3d:c.images3d&&c.images3d!=='[]'&&c.images3d!=='null'?tryParseJSON(c.images3d):[]
    }));
    renderSchedule();
    if(document.getElementById('page-todo').classList.contains('active'))renderTodo();
  }
  setSyncing(false);
}
function tryParseJSON(s){try{return JSON.parse(s);}catch{return [];}}

async function loadLogos(){
  try{
    const{data,error}=await sb.from('logos').select('*').order('created_at');
    if(error)throw error;
    logos=data||[];
    // Only render if element exists (company page is visible)
    const con=document.getElementById('logo-list');
    if(con)renderLogos();
  }catch(err){
    logos=[];
    const con=document.getElementById('logo-list');
    if(con)renderLogos();
    console.warn('loadLogos error:',err);
  }
}

async function addCard(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('請輸入名稱');return;}
  const btn=document.getElementById('add-save-btn');
  btn.textContent='新增中…';btn.disabled=true;
  await sb.from('cards').insert({name,stage:'接洽中',price:'',deposit:null,todos:'',buys:'',quote_url:null,images3d:JSON.stringify([])});
  btn.textContent='新增專案';btn.disabled=false;
  document.getElementById('f-name').value='';
  closeModal('modal-add');showToast('已新增「'+name+'」');writeLog('新增專案',name,'新增專案到「接洽中」');
}

async function saveEdit(){
  // sync hidden fields from checklist state before saving
  syncEditTodoHidden(_editTodos);
  syncEditBuyHidden(_editBuys);
  const name=document.getElementById('e-name').value.trim();
  if(!name){showToast('請輸入名稱');return;}
  const btn=document.getElementById('edit-save-btn');
  btn.textContent='儲存中…';btn.disabled=true;
  const orig=cards.find(c=>c.id===editingId);
  const allImgs=[...(orig?.images3d||[]),...editPending3D];
  const upd={name,
    stage:document.getElementById('e-stage').value,
    price:document.getElementById('e-price').value.trim(),
    deposit:document.getElementById('e-deposit').value||null,
    todos:document.getElementById('e-todo').value.trim(),
    buys:document.getElementById('e-buy').value.trim(),
    images3d:JSON.stringify(allImgs)};
  if(editPendingQuote!=null)upd.quote_url=editPendingQuote;
  await sb.from('cards').update(upd).eq('id',editingId);
  btn.textContent='儲存';btn.disabled=false;
  editPendingQuote=null;editPending3D=[];
  const savedCard=cards.find(c=>c.id===editingId);writeLog('儲存編輯',savedCard?.name||name,'更新專案資料');closeModal('modal-edit');showToast('已儲存');
}

async function deleteCard(){
  if(!confirm('確定刪除？'))return;
  const delCard=cards.find(c=>c.id===editingId);
  await sb.from('cards').delete().eq('id',editingId);
  writeLog('刪除專案',delCard?.name||'','專案已刪除');
  closeModal('modal-edit');showToast('已刪除');
}

async function moveCard(id,stage){
  setSyncing(true);
  const c=cards.find(x=>x.id===id);
  await sb.from('cards').update({stage}).eq('id',id);
  writeLog('移動階段',c?.name||'','移動到「'+stage+'」');
  showToast('→ '+stage);
}

// ── FILE UPLOAD ───────────────────────────────────────────────
async function uploadFile(file,folder){
  const ext=file.name.split('.').pop();
  const filename=`${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const bucket=folder==='assets'?'assets':'projects';
  const{error}=await sb.storage.from(bucket).upload(filename,file,{upsert:true});
  if(error){console.error('upload error:',error);showToast('上傳失敗：'+error.message);return null;}
  return sb.storage.from(bucket).getPublicUrl(filename).data.publicUrl;
}
async function handleQuoteSelect(){
  const files=Array.from(document.getElementById('e-quote').files);
  if(!files.length)return;
  document.getElementById('e-quote-prog').style.display='block';
  window._pendingQuoteFiles=files;
  const urls=[];
  for(const f of files){
    const url=await uploadFile(f,'quotes');
    if(url)urls.push(url);
  }
  document.getElementById('e-quote-prog').style.display='none';
  if(urls.length){
    // Store ALL urls as JSON string
    editPendingQuote=JSON.stringify(urls);
    window._pendingQuoteUrls=urls;
    // show previews - use data-idx to avoid JSON in onclick
    const prev=document.getElementById('e-quote-preview');
    prev.innerHTML=urls.map((u,i)=>`<img src="${u}" data-idx="${i}" data-type="newquote" style="height:60px;border-radius:6px;border:1px solid var(--border);cursor:pointer">`).join('');
    prev.querySelectorAll('img').forEach(img=>img.addEventListener('click',()=>{
      openViewerFromNewQuote(parseInt(img.dataset.idx));
    }));
    document.getElementById('ai-parse-row').style.display='block';
    showToast('報價單上傳完成（'+urls.length+'張），可用 AI 自動填入待辦');
  }
}
function openViewerFromNewQuote(idx){
  viewImageArr(window._pendingQuoteUrls||[],idx);
}

let _cachedApiKey=null;
async function getAnthropicKey(){
  if(_cachedApiKey)return _cachedApiKey;
  try{
    const{data}=await sb.from('settings').select('value').eq('key','anthropic_key').single();
    _cachedApiKey=data?.value||'';
  }catch(e){_cachedApiKey='';}
  return _cachedApiKey;
}
async function setAnthropicKey(key){
  _cachedApiKey=key;
  await sb.from('settings').upsert({key:'anthropic_key',value:key});
}

async function parseQuoteWithAI(){
  // Check for API key
  let key=await getAnthropicKey();
  if(!key){
    key=prompt('請輸入 Anthropic API Key（只需輸入一次，會記住在所有裝置）：');
    if(!key)return;
    await setAnthropicKey(key.trim());
  }
  const files=window._pendingQuoteFiles;
  if(!files||!files.length){showToast('請先上傳報價單圖片');return;}
  const btn=document.getElementById('ai-parse-btn');
  const status=document.getElementById('ai-parse-status');
  btn.textContent='⏳ AI 讀取中，請稍候…';btn.disabled=true;
  status.textContent='正在分析報價單內容…';
  try{
    // Convert all images to base64
    const imgBlocks=await Promise.all(files.map(f=>new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=()=>{
        const b64=reader.result.split(',')[1];
        const mt=f.type||'image/jpeg';
        res({type:'image',source:{type:'base64',media_type:mt,data:b64}});
      };
      reader.onerror=rej;
      reader.readAsDataURL(f);
    })));

    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key||getAnthropicKey(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            ...imgBlocks,
            {type:'text',text:`請讀取這份改裝報價單圖片，把所有有項目編號（數字）的「描述」欄位內容條列出來。
只要描述文字，不要編號、數量、單價、金額。
每行一項，直接輸出文字清單，不要任何說明或前言。
例如：
瓦斯槽
水桶槽
工作區吊櫃`}
          ]
        }]
      })
    });

    const data=await response.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const items=text.split('\n').map(s=>s.trim()).filter(Boolean);
    if(items.length>0){
      const existing=document.getElementById('e-todo').value.trim();
      const existingItems=existing?existing.split('\n').map(s=>s.trim()).filter(Boolean):[];
      const newItems=items.map(t=>({text:t,done:false}));
      _editTodos=[..._editTodos,...newItems];
      renderEditChecklist(_editTodos);
      btn.textContent='✅ 已填入 '+items.length+' 項';
      status.textContent='讀取到 '+items.length+' 個項目，已加入工單';
      showToast('✨ AI 自動填入 '+items.length+' 項工單！');
    }else{
      throw new Error('未讀取到項目');
    }
  }catch(err){
    btn.textContent='✨ AI 自動讀取報價單，填入待辦事項';
    btn.disabled=false;
    status.textContent='讀取失敗：'+err.message;
    showToast('AI 讀取失敗');
  }
}
async function handle3DSelect(){
  const files=Array.from(document.getElementById('e-3d').files);if(!files.length)return;
  document.getElementById('e-3d-prog').style.display='block';
  for(const f of files){const u=await uploadFile(f,'3d-images');if(u)editPending3D.push(u);}
  document.getElementById('e-3d-prog').style.display='none';
  renderEditPending3D();showToast('上傳完成 '+files.length+' 張');
}
function renderEditPending3D(){
  document.getElementById('e-3d-preview').innerHTML=editPending3D.map((u,i)=>`
    <div class="uploaded-tag"><img src="${u}" style="width:18px;height:18px;object-fit:cover;border-radius:3px" onclick="viewImage('${u}')"> 圖${i+1}
    <button style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:12px" onclick="editPending3D.splice(${i},1);renderEditPending3D()">×</button></div>`).join('');
}

// ── HELPERS ───────────────────────────────────────────────────
function daysSince(d){if(!d)return null;return Math.floor((new Date()-new Date(d))/86400000);}
function urgBadge(d){
  if(d===null)return'<span class="badge b-none">未設定</span>';
  if(d>=40)return`<span class="badge b-urgent">🔥${d}天</span>`;
  if(d>=30)return`<span class="badge b-warn">⏰${d}天</span>`;
  return`<span class="badge b-ok">✓${d}天</span>`;
}
function miniCardCls(d){if(!d&&d!==0)return'';if(d>=40)return' warn40';if(d>=30)return' warn30';return'';}

// ── RENDER SCHEDULE ──────────────────────────────────────────
function renderSchedule(){
  const con=document.getElementById('page-schedule');
  const p1c=cards.filter(c=>P1_STAGES.includes(c.stage)).length;
  const p2c=cards.filter(c=>P2_STAGES.includes(c.stage)).length;
  const p3c=cards.filter(c=>P3_STAGES.includes(c.stage)).length;

  con.innerHTML=`
    ${renderPhaseBlock('p1','dot-1','第一階段',p1c,renderKanban(P1_STAGES,'p1'))}
    ${renderPhaseBlock('p2','dot-2','第二階段',p2c,renderFullStages(P2_STAGES))}
    ${renderPhaseBlock('p3','dot-3','第三階段',p3c,renderKanban(P3_STAGES,'p3'))}
    <button class="add-btn" onclick="openModal('modal-add')">＋ 新增業主專案</button>
  `;
  // bind drag for full cards
  bindImgsAndDrag();
}

function renderPhaseBlock(id,dot,label,count,bodyHtml){
  const open=phaseOpen[id];
  return`<div class="phase-block">
    <div class="phase-header${open?' open':''}" onclick="togglePhase('${id}')">
      <div class="phase-header-left">
        <span class="phase-dot ${dot}"></span>
        <span class="phase-title">${label}</span>
        <span class="phase-count">${count} 個專案</span>
      </div>
      <span class="phase-chevron">▾</span>
    </div>
    <div class="phase-body${open?' open':''}" id="body-${id}">${bodyHtml}</div>
  </div>`;
}

function togglePhase(id){
  phaseOpen[id]=!phaseOpen[id];
  const h=document.querySelector(`[onclick="togglePhase('${id}')"]`);
  const b=document.getElementById('body-'+id);
  if(phaseOpen[id]){h.classList.add('open');b.classList.add('open');}
  else{h.classList.remove('open');b.classList.remove('open');}
}

// KANBAN (P1, P3)
function renderKanban(stages,phaseId){
  const cols=stages.map(s=>{
    const sc=cards.filter(c=>c.stage===s);
    const cardsHtml=sc.map(c=>renderMiniCard(c,phaseId)).join('');
    return`<div class="kanban-col">
      <div class="kanban-col-title">▸${s}<span class="col-count">${sc.length}</span></div>
      <div class="kanban-drop" data-stage="${s}" data-phase="${phaseId}"
        ondragover="kanbanDragOver(event)" ondragleave="kanbanDragLeave(event)" ondrop="kanbanDrop(event,this)">
        ${cardsHtml}
      </div>
    </div>`;
  }).join('');
  return`<div class="kanban-scroll">${cols}</div>`;
}

function renderMiniCard(c,phaseId){
  const d=daysSince(c.deposit);
  const cls=miniCardCls(d);
  const badge=c.deposit?urgBadge(d):'';
  return`<div class="mini-card${cls}" data-id="${c.id}" draggable="true"
    ontouchstart="touchStart(event,'${c.id}','kanban')" ontouchmove="touchMove(event)" ontouchend="touchEnd(event,'kanban')">
    <div class="mini-card-name">${c.name}</div>
    ${badge}
    <div class="mini-card-edit" onclick="openEdit('${c.id}')">✏️ 編輯</div>
    <div class="mini-card-hint">⠿ 長按拖曳</div>
  </div>`;
}

// FULL STAGES (P2)
function renderFullStages(stages){
  return stages.map(s=>{
    const sc=cards.filter(c=>c.stage===s);
    return`<div class="stage-group2">
      <div class="stage-label2">▸ ${s}<span class="stage-cnt">${sc.length}</span></div>
      <div class="full-drop" data-stage="${s}" data-phase="p2"

}

function renderFullCard(c){
  const d=daysSince(c.deposit);

  return`<div class="card${cls}" data-id="${c.id}" draggable="true"

      </div>
      <button class="edit-btn" onclick="openEdit('${c.id}')">✏️</button>
    </div>

// Desktop kanban
function kanbanDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function kanbanDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function kanbanDrop(e,zone){e.preventDefault();zone.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain');if(id)moveCard(id,zone.dataset.stage);}

// Desktop full
function fullDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function fullDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function fullDrop(e,zone){e.preventDefault();zone.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain');if(id)moveCard(id,zone.dataset.stage);}

function bindImgsAndDrag(){bindImgThumbs();bindFullDrag();}
function bindFullDrag(){
  document.querySelectorAll('.card[draggable],.mini-card[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.id);setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
}

// Touch drag (unified)
let tId=null,tClone=null,tTimer=null,tActive=false,tType=null;
function touchStart(e,id,type){
  tTimer=setTimeout(()=>{
    tActive=true;tId=id;tType=type;
    const el=e.currentTarget;
    tClone=el.cloneNode(true);
    tClone.style.cssText=`position:fixed;z-index:999;width:${el.offsetWidth}px;opacity:0.75;pointer-events:none;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.25)`;
    document.body.appendChild(tClone);
    el.classList.add('dragging');
    showToast('拖曳中…');
  },500);
}
function touchMove(e){
  if(!tActive)return;e.preventDefault();
  const t=e.touches[0];
  if(tClone){tClone.style.left=(t.clientX-60)+'px';tClone.style.top=(t.clientY-30)+'px';}
  const sel=tType==='kanban'?'.kanban-drop':'.full-drop,.kanban-drop';
  document.querySelectorAll(sel).forEach(z=>{
    const r=z.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)z.classList.add('drag-over');
    else z.classList.remove('drag-over');
  });
}
function touchEnd(e,type){
  clearTimeout(tTimer);
  if(!tActive){tActive=false;return;}
  if(tClone){tClone.remove();tClone=null;}
  document.querySelectorAll('.dragging').forEach(c=>c.classList.remove('dragging'));
  const active=document.querySelector('.drag-over');
  if(active&&tId){moveCard(tId,active.dataset.stage);active.classList.remove('drag-over');}
  else document.querySelectorAll('.drag-over').forEach(z=>z.classList.remove('drag-over'));
  tActive=false;tId=null;
}

function toggleChk(el){el.classList.toggle('done');el.textContent=el.classList.contains('done')?'✓':'';el.nextElementSibling?.classList.toggle('done-txt');}

async function toggleBuyItem(el,cardId,itemText){
  // Visual feedback immediately
  el.classList.add('done');
  el.textContent='✓';
  el.nextElementSibling?.classList.add('done-txt');
  el.onclick=null; // prevent double click

  // Find the card and mark this buy item as done
  const card=cards.find(c=>c.id===cardId);
  if(!card)return;

  const buyItems=parseTodos(card.buys);
  const updated=buyItems.map(b=>b.text===itemText?{...b,done:true}:b);
  const newBuys=todosToStrings(updated).join('\n');

  setSyncing(true);
  await sb.from('cards').update({buys:newBuys}).eq('id',cardId);
  setSyncing(false);

  // Show toast and refresh after short delay
  showToast('✓ 已採購：'+itemText);
  setTimeout(()=>renderTodo(),800);
}

async function saveLogo(){
  const name=document.getElementById('l-name').value.trim();if(!name){showToast('請輸入名稱');return;}
  const url=document.getElementById('l-url').value.trim();
  if(!url){showToast('請先上傳圖片');return;}
  const obj={name,url,bg:'#F5F4F0',fg:'#1A1A18'};
  let result;
  if(editingLogoId){
    result=await sb.from('logos').update(obj).eq('id',editingLogoId).select();
  } else {
    result=await sb.from('logos').insert(obj).select();
  }
  if(result.error){showToast('儲存失敗：'+result.error.message);return;}
  // Directly update local array and re-render without waiting for Realtime
  if(editingLogoId){
    logos=logos.map(l=>l.id===editingLogoId?{...l,...obj}:l);
  } else {
    const newLogo=result.data&&result.data[0]?result.data[0]:{id:Date.now(),...obj};
    logos=[...logos,newLogo];
  }
  closeModal('modal-logo');
  renderLogos();
  showToast(editingLogoId?'已更新':'已新增');
}
async function deleteLogo(){
  if(!confirm('確定刪除？'))return;
  await sb.from('logos').delete().eq('id',editingLogoId);
  logos=logos.filter(l=>l.id!==editingLogoId);
  closeModal('modal-logo');
  renderLogos();
  showToast('已刪除');
}
function fixLogoUrl(url){

async function copyLogoImg(id){
  const l=logos.find(x=>x.id===id);
  if(!l?.url){showToast('尚未設定圖片');return;}
  const url=fixLogoUrl(l.url);
  try{
    const res=await fetch(url);
    const blob=await res.blob();
    await navigator.clipboard.write([new ClipboardItem({[blob.type]:blob})]);
    showToast('已複製圖片！可直接貼上');
  }catch(e){
    // Fallback: copy URL
    if(navigator.clipboard)navigator.clipboard.writeText(url);
    showToast('已複製圖片網址（此裝置不支援直接複製圖片）');
  }
}

// ── TODOS PARSE (stored as "text||done" per line) ─────────────
function parseTodos(arr){
  return arr.map(t=>{
    if(typeof t==='object')return t;
    if(t.startsWith('✓')){return{text:t.slice(1).trim(),done:true};}
    return{text:t,done:false};
  });
}
function todosToStrings(items){return items.map(t=>(t.done?'✓':'')+t.text);}

      copyTodoToBuy(el.dataset.text);
    });
  });

// ── IMAGE VIEWER with swipe ───────────────────────────────────
let _viewerImages=[];let _viewerIdx=0;let _vTouchX=null;
function viewImageArr(arr,idx){
  _viewerImages=arr&&arr.length?arr:[];
  _viewerIdx=idx||0;
  if(_viewerIdx>=_viewerImages.length)_viewerIdx=0;
  updateViewer();
  document.getElementById('viewer').classList.add('open');
}
function viewImage(src,allImgs){
  const arr=allImgs&&allImgs.length?allImgs:[src];
  const idx=arr.indexOf(src);
  viewImageArr(arr,idx<0?0:idx);
}
function updateViewer(){
  const img=document.getElementById('viewer-img');
  img.src=_viewerImages[_viewerIdx];
  resetImgTransform(false);
  const cnt=document.getElementById('viewer-counter');
  cnt.textContent=_viewerImages.length>1?(_viewerIdx+1)+' / '+_viewerImages.length:'';
  document.getElementById('viewer-prev').style.display=_viewerImages.length>1?'flex':'none';
  document.getElementById('viewer-next').style.display=_viewerImages.length>1?'flex':'none';
}

// ── PINCH ZOOM + PAN (iPhone Photos style) ───────────────────
let _imgScale=1,_imgTX=0,_imgTY=0;
let _lastDist=0,_lastMidX=0,_lastMidY=0;
let _pinching=false,_panning=false;
let _panStartX=0,_panStartY=0,_panBaseX=0,_panBaseY=0;
let _vSwipeStartX=0,_vSwipeStartY=0,_vSwipeActive=false;

function applyImgTransform(transition){
  const img=document.getElementById('viewer-img');
  if(!img)return;
  img.style.transition=transition?'transform 0.2s':'none';
  img.style.transform=`translate(${_imgTX}px,${_imgTY}px) scale(${_imgScale})`;
}

function clampPan(){
  const img=document.getElementById('viewer-img');
  if(!img)return;
  const w=img.naturalWidth||img.offsetWidth;
  const h=img.naturalHeight||img.offsetHeight;
  const dw=img.offsetWidth;
  const dh=img.offsetHeight;
  const maxX=Math.max(0,(dw*_imgScale-dw)/2);
  const maxY=Math.max(0,(dh*_imgScale-dh)/2);
  _imgTX=Math.min(maxX,Math.max(-maxX,_imgTX));
  _imgTY=Math.min(maxY,Math.max(-maxY,_imgTY));
}

function resetImgTransform(animate){
  _imgScale=1;_imgTX=0;_imgTY=0;
  applyImgTransform(animate);
}

(function initViewerTouch(){
  function tryBind(){
    const viewerEl=document.getElementById('viewer');
    if(!viewerEl){setTimeout(tryBind,200);return;}
    viewerEl.addEventListener('touchstart',e=>{
    if(!viewerEl.classList.contains('open'))return;
    if(e.touches.length===2){
      _pinching=true;_panning=false;_vSwipeActive=false;
      _lastDist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      _lastMidX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      _lastMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      e.preventDefault();
    } else if(e.touches.length===1){
      if(_imgScale>1){
        // pan mode
        _panning=true;_vSwipeActive=false;
        _panStartX=e.touches[0].clientX;
        _panStartY=e.touches[0].clientY;
        _panBaseX=_imgTX;
        _panBaseY=_imgTY;
      } else {
        // swipe mode for next/prev
        _vSwipeActive=true;_panning=false;
        _vSwipeStartX=e.touches[0].clientX;
        _vSwipeStartY=e.touches[0].clientY;
      }
    }
  },{passive:false});

  viewerEl.addEventListener('touchmove',e=>{
    if(!viewerEl.classList.contains('open'))return;
    if(e.touches.length===2&&_pinching){
      const dist=Math.hypot(
        e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY
      );
      const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const delta=dist/_lastDist;
      const newScale=Math.min(Math.max(_imgScale*delta,1),6);
      // Adjust translation so zoom anchors at pinch midpoint
      const img=document.getElementById('viewer-img');
      const rect=img.getBoundingClientRect();
      const originX=midX-rect.left-rect.width/2;
      const originY=midY-rect.top-rect.height/2;
      _imgTX+=originX*(delta-1)+(midX-_lastMidX);
      _imgTY+=originY*(delta-1)+(midY-_lastMidY);
      _imgScale=newScale;
      _lastDist=dist;_lastMidX=midX;_lastMidY=midY;
      clampPan();
      applyImgTransform(false);
      e.preventDefault();
    } else if(e.touches.length===1&&_panning){
      _imgTX=_panBaseX+(e.touches[0].clientX-_panStartX);
      _imgTY=_panBaseY+(e.touches[0].clientY-_panStartY);
      clampPan();
      applyImgTransform(false);
      e.preventDefault();
    }
  },{passive:false});

  viewerEl.addEventListener('touchend',e=>{
    if(!viewerEl.classList.contains('open'))return;
    if(e.touches.length<2&&_pinching){
      _pinching=false;
      if(_imgScale<1.05){resetImgTransform(true);}
      else clampPan();
    }
    if(e.touches.length===0&&_vSwipeActive){
      _vSwipeActive=false;
      const dx=e.changedTouches[0].clientX-_vSwipeStartX;
      const dy=Math.abs(e.changedTouches[0].clientY-_vSwipeStartY);
      if(Math.abs(dx)>50&&dy<40&&_imgScale<=1.05){
        viewerNav(dx<0?1:-1);
      }
    }
    if(e.touches.length===0)_panning=false;
  },{passive:true});
  }
  tryBind();
})();
function viewerNav(dir){
  _viewerIdx=(_viewerIdx+dir+_viewerImages.length)%_viewerImages.length;
  updateViewer();
}
function closeViewer(){document.getElementById('viewer').classList.remove('open');}
function handleViewerBgClick(e){
  if(_imgScale>1.05)return; // don't close when zoomed
  if(e.target===document.getElementById('viewer'))closeViewer();
}

function parseQuoteUrls(val){
  if(!val||val==='null')return[];
  try{
    const p=JSON.parse(val);

  }catch(e){}
  if(typeof val==='string'&&val.startsWith('http'))return[val];
  return[];
}

// ── LOGS ─────────────────────────────────────────────────────
async function writeLog(action, cardName, detail){
  if(!currentUser)return;
  const userName=currentUser.user_metadata?.full_name||currentUser.email||'未知';
  const userEmail=currentUser.email||'';
  try{
    await sb.from('logs').insert({
      user_name:userName,
      user_email:userEmail,
      action,
      card_name:cardName||'',
      detail:detail||''
    });
  }catch(e){console.warn('writeLog error:',e);}
}

async function renderLogs(){
  const con=document.getElementById('page-logs');
  if(!con)return;
  con.innerHTML='<div class="loading"><div class="spinner"></div>載入中…</div>';
  const{data,error}=await sb.from('logs').select('*').order('created_at',{ascending:false}).limit(100);
  if(error||!data){con.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">載入失敗</div>';return;}
  if(!data.length){con.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">📝 目前沒有編輯紀錄</div>';return;}

  // Group by date
  const groups={};
  data.forEach(log=>{
    const d=new Date(log.created_at);
    const dateKey=d.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    if(!groups[dateKey])groups[dateKey]=[];
    groups[dateKey].push(log);
  });

  let h='';
  Object.entries(groups).forEach(([date,logs])=>{
    h+=`<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.5px;padding:6px 0 8px">${date}</div>`;
    logs.forEach(log=>{
      const time=new Date(log.created_at).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      const avatar=(log.user_name||'?').charAt(0).toUpperCase();
      const actionColor=
        log.action==='新增專案'?'#1D9E75':
        log.action==='刪除專案'?'#E24B4A':
        log.action==='移動階段'?'#185FA5':
        log.action==='完成工單'?'#639922':
        log.action==='儲存編輯'?'#378ADD':'#888780';
      h+=`<div style="background:var(--card);border-radius:10px;border:1px solid var(--border);padding:11px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--blue-dark);flex-shrink:0">${avatar}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
            <span style="font-size:12px;font-weight:700;color:var(--text)">${log.user_name||log.user_email||'未知'}</span>
            <span style="font-size:10px;padding:1px 7px;border-radius:4px;font-weight:500;background:${actionColor}20;color:${actionColor}">${log.action}</span>
            <span style="font-size:10px;color:var(--text3);margin-left:auto">${time}</span>
          </div>
          ${log.card_name?`<div style="font-size:11px;color:var(--text2);margin-bottom:2px">📌 ${log.card_name}</div>`:''}
          ${log.detail?`<div style="font-size:11px;color:var(--text)">${log.detail}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  con.innerHTML=h;
}

// ── INVENTORY ────────────────────────────────────────────────
async function loadInventory(){
  const{data,error}=await sb.from('inventory').select('*').order('created_at');
  if(!error){inventory=data||[];}
}

async function addInventory(){
  const inp=document.getElementById('inv-input');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text){showToast('請輸入項目');return;}
  const{data,error}=await sb.from('inventory').insert({text,done:false}).select();
  if(error){showToast('新增失敗');return;}
  inventory=[...inventory,...(data||[])];
  inp.value='';
  renderTodo();
  showToast('已新增：'+text);
}

async function toggleInventory(id){
  const item=inventory.find(i=>i.id===id);
  if(!item)return;
  const newDone=!item.done;
  await sb.from('inventory').update({done:newDone}).eq('id',id);
  inventory=inventory.map(i=>i.id===id?{...i,done:newDone}:i);
  renderTodo();
  if(newDone)showToast('✓ 已採購');
}

async function deleteInventory(id){
  await sb.from('inventory').delete().eq('id',id);
  inventory=inventory.filter(i=>i.id!==id);
  renderTodo();
}
